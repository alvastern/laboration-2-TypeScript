<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Min ToDo</title>
  </head>

  <body>
    <header>
      <h1>Min ToDo</h1>
    </header>

    <section>
      <h2>Lägg till ny uppgift</h2>

      <form id="todo-form">
        <div>
          <label for="uppgift-titel">Uppgift:</label>
          <input type="text" name="Uppgift" id="uppgift-titel" required>
        </div>

        <div>
          <label for="prioritet">Prioritet:</label>
          <select name="Prioritet" id="prioritet">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>
        </div>

        <div>
          <button type="submit" id="add-button">Lägg till</button>
        </div>
      </form>
    </section>

    <hr id="linje">

    <section>
      <h2>ToDo lista</h2>
      <ul id="todo-lista"></ul>

      <article>
        <h3>Avslutade uppgifter</h3>
        <ul id="avslutade-list"></ul>
      </article>
    </section>

    <script type="module" src="/src/ts/main.ts"></script>
  </body>
</html>
